name: leiden_spatial
namespace: cluster
scope: public
description: |
  Identify spatial domains by running Leiden clustering on a joint graph that combines
  gene expression similarity and spatial proximity. Both an expression neighborhood graph
  and a spatial neighborhood graph must be pre-computed and stored in `.obsp` of the input
  MuData object.

  Based on the approach described in Palla et al. (2022): the spatial and expression
  connectivity matrices are weighted by `alpha` and `(1 - alpha)` respectively, combined
  additively, and Leiden community detection is run on the resulting joint graph.

authors:
  - __merge__: /src/authors/jakub_majercik.yaml
    roles: [ maintainer ]

argument_groups:
  - name: "Inputs"
    arguments:
      - name: "--input"
        type: file
        required: true
        description: Input H5MU file with a pre-computed spatial neighborhood graph.
      - name: "--modality"
        type: string
        default: "rna"
        required: false
        description: Modality from the input MuData file to process.
      - name: "--input_obsp_expression_connectivities"
        type: string
        default: "connectivities"
        description: |
          Key in `adata.obsp` containing the expression connectivity matrix, as produced
          by a neighbors component (e.g. `neighbors/find_neighbors`).
      - name: "--input_obsp_spatial_connectivities"
        type: string
        default: "spatial_connectivities"
        description: |
          Key in `adata.obsp` containing the spatial connectivity matrix, as produced by
          the `neighbors/spatial_neighborhood_graph` component.

  - name: "Clustering options"
    arguments:
      - name: "--alpha"
        type: double
        default: 0.2
        min: 0.0
        max: 1.0
        description: |
          Weight of the spatial graph in the joint graph. The gene expression graph
          receives weight `(1 - alpha)`. A value of 0 means pure expression-based
          clustering; a value of 1 means pure spatial clustering.
      - name: "--resolution"
        type: double
        default: 1.0
        min: 0.0
        description: |
          Resolution parameter for the Leiden algorithm. Higher values produce more and
          smaller clusters.
      - name: "--obs_label"
        type: string
        default: "leiden_spatial"
        description: Key in `adata.obs` where the spatial domain labels will be stored.

  - name: Outputs
    arguments:
      - name: "--output"
        type: file
        direction: output
        required: true
        description: Output H5MU file path.
        example: output.h5mu
    __merge__: [., /src/base/h5_compression_argument.yaml]

resources:
  - type: python_script
    path: script.py
  - path: /src/utils/setup_logger.py

test_resources:
  - type: python_script
    path: test.py
  - path: /resources_test/xenium/xenium_tiny.qc.neighbors.h5mu

engines:
  - type: docker
    image: python:3.12-slim
    setup:
      - type: apt
        packages:
          - procps
      - type: python
        __merge__: [ /src/base/requirements/scanpy.yaml, /src/base/requirements/anndata_mudata.yaml, . ]
        packages:
          - igraph
    __merge__: [ /src/base/requirements/python_test_setup.yaml, .]

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [midcpu, midmem, middisk]
