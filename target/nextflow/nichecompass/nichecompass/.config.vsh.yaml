name: "nichecompass"
namespace: "nichecompass"
version: "build_niche_compass"
authors:
- name: "Dorien Roosen"
  roles:
  - "maintainer"
  info:
    role: "Core Team Member"
    links:
      email: "dorien@data-intuitive.com"
      github: "dorien-er"
      linkedin: "dorien-roosen"
    organizations:
    - name: "Data Intuitive"
      href: "https://www.data-intuitive.com"
      role: "Data Scientist"
argument_groups:
- name: "Inputs"
  arguments:
  - type: "file"
    name: "--input"
    description: "Input H5MU file"
    info: null
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_gp_mask"
    description: "JSON file containing a nested dictionary containing the gene programs,\n\
      with keys being gene program names and values being dictionaries with keys `targets`\
      \ and `sources`,\nwhere `targets` contains a list of the names of genes in the\
      \ gene program for the reconstruction of the gene expression of the node itself\
      \ (receiving node)\nand `sources` contains a list of the names of genes in the\
      \ gene program for the reconstruction of the gene expression of the node's neighbors\
      \ (transmitting nodes).\n"
    info: null
    example:
    - "prior_knowledge_gp_mask.json"
    must_exist: true
    create_parent: true
    required: true
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--modality"
    description: "Which modality from the input MuData file to process.\n"
    info: null
    default:
    - "rna"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--layer"
    description: "Input layer to use. If None, X is used"
    info: null
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--var_input"
    description: "Key in adata.var that indicates which features to include as input\
      \ for the NicheCompass model.\nIf not provided, all features will be included.\n"
    info: null
    default:
    - "filter_with_hvg"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--input_obsp_spatial_connectivities"
    description: "Key in adata.obsp where connectivities of the spatial neighborhood\
      \ graph are stored"
    info: null
    default:
    - "spatial_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--input_obs_covariates"
    description: "Keys of the adata.obs fields to use as covariates."
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
- name: "Gene Program Mask"
  arguments:
  - type: "integer"
    name: "--min_genes_per_gp"
    description: "Minimum number of genes in a gene program inluding both target and\
      \ source genes that need to be available in the adata (gene expression has been\
      \ probed) for a gene program not to be discarded.\n"
    info: null
    default:
    - 1
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--min_source_genes_per_gp"
    description: "Minimum number of source genes in a gene program that need to be\
      \ available in the adata (gene expression has been probed) for a gene program\
      \ not to be discarded.\n"
    info: null
    default:
    - 0
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--min_target_genes_per_gp"
    description: "Minimum number of target genes in a gene program that need to be\
      \ available in the adata (gene expression has been probed) for a gene program\
      \ not to be discarded.\n"
    info: null
    default:
    - 0
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--max_genes_per_gp"
    description: "Maximum number of genes in a gene program inluding both target and\
      \ source genes that can be available in the adata (gene expression has been\
      \ probed) for a gene program not to be discarded.\n"
    info: null
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--max_source_genes_per_gp"
    description: "Maximum number of source genes in a gene program that can be available\
      \ in the adata (gene expression has been probed) for a gene program not to be\
      \ discarded.\n"
    info: null
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--max_target_genes_per_gp"
    description: "Maximum number of target genes in a gene program that can be available\
      \ in the adata (gene expression has been probed) for a gene program not to be\
      \ discarded.\n"
    info: null
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean_true"
    name: "--filter_genes_not_in_masks"
    description: "Whether to remove the genes that are not in the gp masks from the\
      \ adata object.\n"
    info: null
    direction: "input"
- name: "NicheCompass Model Architecture"
  arguments:
  - type: "boolean"
    name: "--covariate_edges"
    description: "List of booleans that indicate whether there can be edges between\
      \ different categories of the categorical covariates.\nIf this is `True` for\
      \ a specific categorical covariate, this covariate will be excluded from the\
      \ edge reconstruction loss.\nNeeds to match the length and order of `--input_obs_covariates`.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--covariate_embedding_injection_layers"
    description: "List of VGPGAE modules in which the categorical covariates embeddings\
      \ are injected.\n"
    info: null
    default:
    - "gene_expr_decoder"
    - "chrom_access_decoder"
    required: false
    choices:
    - "encoder"
    - "gene_expr_decoder"
    - "chrom_access_decoder"
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "boolean"
    name: "--include_edge_recon_loss"
    description: "Whether to include the edge reconstruction loss in the backpropagation.\n"
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--include_gene_expr_recon_loss"
    description: "Whether to include the gene expression reconstruction loss in the\
      \ backpropagation.\n"
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--include_cat_covariates_contrastive_loss"
    description: "Whether to include the categorical covariates contrastive loss in\
      \ the backpropagation.\n"
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--gene_expr_recon_dist"
    description: "The distribution used for gene expression reconstruction. \nIf `nb`,\
      \ uses a negative binomial distribution. \nIf `zinb`, uses a zero-inflated negative\
      \ binomial distribution.\n"
    info: null
    default:
    - "nb"
    required: false
    choices:
    - "nb"
    - "zinb"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--log_variational"
    description: "Whether to transform x by log(x+1) prior to encoding for numerical\
      \ stability (not for normalization).\n"
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--node_label_method"
    description: "Node label method that will be used for omics reconstruction.\n\
      If `one-hop-sum`, uses a concatenation of the node's input features with the\
      \ sum of the input features of all nodes in the node's one-hop neighborhood.\n\
      If `one-hop-norm`, uses a concatenation of the node's input features with the\
      \ node's one-hop neighbors input features normalized as per Kipf, T. N. & Welling,\
      \ M. Semi-Supervised Classification with Graph Convolutional Networks. arXiv\
      \ [cs.LG] (2016).\nIf `one-hop-attention`, uses a concatenation of the node's\
      \ input features with the node's one-hop neighbors input features weighted by\
      \ an attention mechanism.\n"
    info: null
    default:
    - "one-hop-norm"
    required: false
    choices:
    - "one-hop-norm"
    - "two-hop-norm"
    - "one-hop-attention"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--active_gp_thresh_ratio"
    description: "Ratio that determines which gene programs are considered active\
      \ and are used in the latent representation after model training.\nAll inactive\
      \ gene programs will be dropped during model training after a determined number\
      \ of epochs.\nAggregations of the absolute values of the gene weights of the\
      \ gene expression decoder per gene program are calculated.\nThe maximum value,\
      \ i.e. the value of the gene program with the highest aggregated value will\
      \ be used as a benchmark and all gene programs whose aggregated value is smaller\
      \ than `--active_gp_thresh_ratio` times this maximum value will be set to inactive.\n\
      If set to 0, all gene programs will be considered active.\n"
    info: null
    default:
    - 0.1
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--active_gp_type"
    description: "Type to determine active gene programs. \nCan be `mixed`, in which\
      \ case active gene programs are determined across prior and add-on gene programs\
      \ jointly,\nor `separate` in which case they are determined separately for prior\
      \ and add-on gene programs.\n"
    info: null
    default:
    - "separate"
    required: false
    choices:
    - "mixed"
    - "separate"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_fc_layers_encoder"
    description: "Number of fully connected layers in the encoder before message passing\
      \ layers.\n"
    info: null
    default:
    - 1
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_layers_encoder"
    description: "Number of message passing layers in the encoder.\n"
    info: null
    default:
    - 1
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_hidden_encoder"
    description: "Number of nodes in the encoder hidden layers.\n  If not provided,\
      \ it will be determined automatically based on the number of input genes and\
      \ gene programs.\n"
    info: null
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--conv_layer_encoder"
    description: "Convolutional layer used as GNN in the encoder.\n"
    info: null
    default:
    - "gatv2conv"
    required: false
    choices:
    - "gcnconv"
    - "gatv2conv"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--encoder_n_attention_heads"
    description: "Number of attention heads used in the GNN layers of the encoder.\n\
      Only relevant if `--conv_layer_encoder gatv2conv`. \n"
    info: null
    default:
    - 4
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--encoder_use_bn"
    description: "Whether to use a batch normalization layer at the end of the encoder\
      \ to normalize `mu`.\n"
    info: null
    default:
    - false
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--dropout_rate_encoder"
    description: "Probability that nodes will be dropped in the encoder during training.\n"
    info: null
    default:
    - 0.0
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--dropout_rate_graph_decoder"
    description: "Probability that nodes will be dropped in the graph decoder during\
      \ training.\n"
    info: null
    default:
    - 0.0
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_addon_gp"
    description: "Number of addon gene programs (i.e. gene programs that are not included\
      \ in masks but can be learned de novo).\n"
    info: null
    default:
    - 100
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--cat_covariates_embeds_nums"
    description: "Number of embedding nodes for all categorical covariates.\nMust\
      \ be the same length as `--input_obs_covariates`.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "integer"
    name: "--random_state"
    description: "Random seed for reproducibility.\n"
    info: null
    default:
    - 0
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "NicheCompass Training Parameters"
  arguments:
  - type: "integer"
    name: "--n_epochs"
    description: "Number of training epochs"
    info: null
    default:
    - 100
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_epochs_all_gps"
    description: "Number of epochs during which all gene programs are used for model\
      \ training.\nAfter that only active gene programs are retained.\n"
    info: null
    default:
    - 25
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_epochs_no_edge_recon"
    description: "Number of epochs during which the edge reconstruction loss is excluded\
      \ from backpropagation for pretraining using the other loss components.\n"
    info: null
    default:
    - 0
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_epochs_no_cat_covariates_contrastive"
    description: "Number of epochs during which the categorical covariates contrastive\
      \ loss is excluded from backpropagation for pretraining using the other loss\
      \ components.\n"
    info: null
    default:
    - 5
    required: false
    min: 0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lr"
    description: "Learning rate"
    info: null
    default:
    - 0.001
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--weight_decay"
    description: "Weight decay (L2 penalty)."
    info: null
    default:
    - 0.001
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_edge_recon"
    description: "Lambda (weighting factor) for the edge reconstruction loss.\nIf\
      \ `>0`, this will enforce gene programs to be meaningful for edge reconstruction\
      \ and, hence, to preserve spatial colocalization information.\n"
    info: null
    default:
    - 500000.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_gene_expr_recon"
    description: "Lambda (weighting factor) for the gene expression reconstruction\
      \ loss.\nIf `>0`, this will enforce interpretable gene programs that can be\
      \ combined in a linear way to reconstruct gene expression.\n"
    info: null
    default:
    - 300.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_cat_covariates_contrastive"
    description: "Lambda (weighting factor) for the categorical covariates contrastive\
      \ loss.\nIf `>0`, this will enforce observations with different categorical\
      \ covariates categories with very similar latent representations to become more\
      \ similar, and observations with different latent representations to become\
      \ more different.\n"
    info: null
    default:
    - 0.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--contrastive_logits_pos_ratio"
    description: "Ratio for determining the logits threshold of positive contrastive\
      \ examples of node pairs from different categorical covariates categories.\n\
      The top (`contrastive_logits_pos_ratio` * 100)% logits of node pairs from different\
      \ categorical covariates categories serve as positive labels for the contrastive\
      \ loss.\n"
    info: null
    default:
    - 0.0
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--contrastive_logits_neg_ratio"
    description: "Ratio for determining the logits threshold of negative contrastive\
      \ examples of node pairs from different categorical covariates categories.\n\
      The bottom (`contrastive_logits_neg_ratio` * 100)% logits of node pairs from\
      \ different categorical covariates categories serve as negative labels for the\
      \ contrastive loss.\n"
    info: null
    default:
    - 0.0
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_group_lasso"
    description: "Lambda (weighting factor) for the group lasso regularization loss\
      \ of gene programs.\nIf `>0`, this will enforce sparsity of gene programs.\n"
    info: null
    default:
    - 0.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_l1_masked"
    description: "Lambda (weighting factor) for the L1 regularization loss of genes\
      \ in masked gene programs.\nIf `>0`, this will enforce sparsity of genes in\
      \ masked gene programs.\n"
    info: null
    default:
    - 0.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--l1_targets_categories"
    description: "Gene program mask targets categories for which l1 regularization\
      \ loss will be applied.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--l1_sources_categories"
    description: "Gene program mask sources categories for which l1 regularization\
      \ loss will be applied.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "double"
    name: "--lambda_l1_addon"
    description: "Lambda (weighting factor) for the L1 regularization loss of genes\
      \ in addon gene programs.\nIf `>0`, this will enforce sparsity of genes in addon\
      \ gene programs.\n"
    info: null
    default:
    - 30.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--edge_val_ratio"
    description: "Fraction of the data that is used as validation set on edge-level.\
      \ The rest of the data will be used as training set on edge-level.\n"
    info: null
    default:
    - 0.1
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--node_val_ratio"
    description: "Fraction of the data that is used as validation set on node-level.\
      \ The rest of the data will be used as training set on node-level.\n"
    info: null
    default:
    - 0.1
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--edge_batch_size"
    description: "Batch size for the edge-level dataloaders.\n"
    info: null
    default:
    - 256
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--node_batch_size"
    description: "Batch size for the node-level dataloaders.\nIf not provided, is\
      \ automatically determined based on `--edge_batch_size`.\n"
    info: null
    required: false
    min: 1
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--n_sampled_neighbors"
    description: "Number of neighbors that are sampled during model training from\
      \ the spatial neighborhood graph.\nIf set to -1, all direct neighbors are included.\n"
    info: null
    default:
    - -1
    required: false
    min: -1
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Outputs"
  arguments:
  - type: "file"
    name: "--output"
    description: "Output H5MU file"
    info: null
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_model"
    description: "Directory to save the trained NicheCompass model"
    info: null
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_obsm_embedding"
    description: "Key of the obsm field where the latent / gene program representation\
      \ of active gene programs will be stored after NicheCompass model training.\n"
    info: null
    default:
    - "nichecompass_latent"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_varm_gp_targets_mask"
    description: "Key of the varm field where the binary gene program mask for target\
      \ genes of a gene program will be stored (target genes are used for the reconstruction\
      \ of the gene expression of the node itself (receiving node )).\n"
    info: null
    default:
    - "nichecompass_gp_targets"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_varm_gp_sources_mask"
    description: "Key of the varm field where the binary gene program mask for source\
      \ genes of a gene program will be stored (source genes are used for the reconstruction\
      \ of the gene expression of the node's neighbors (transmitting nodes)).\n"
    info: null
    default:
    - "nichecompass_gp_sources"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_gp_names"
    description: "Key of the uns field where the gene program names will be stored.\n"
    info: null
    default:
    - "nichecompass_gp_names"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_active_gp_names"
    description: "Key of the uns field where the active gene program names will be\
      \ stored.\n"
    info: null
    default:
    - "nichecompass_active_gp_names"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_genes_index"
    description: "Key of the uns field where the index of a concatenated vector of\
      \ target and source genes that are in the gene program masks will be stored.\n"
    info: null
    default:
    - "nichecompass_genes_idx"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_target_genes_index"
    description: "Key of the uns field where the index of the target genes that are\
      \ in the gene program mask will be stored.\n"
    info: null
    default:
    - "nichecompass_target_genes_idx"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_source_genes_index"
    description: "Key of the uns field where the index of the source genes that are\
      \ in the gene program mask will be stored.\n"
    info: null
    default:
    - "nichecompass_source_genes_idx"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_uns_covariate_embeddings"
    description: "Key of the uns fields where the covariate embeddings will be stored.\n\
      Needs to match the length and order of `--input_obs_covariates`.\n"
    info: null
    required: false
    direction: "input"
    multiple: true
    multiple_sep: ";"
  - type: "string"
    name: "--output_obsp_reconstructed_adj_edge_proba"
    description: "Key of the obsp field where the reconstructed adjacency matrix edge\
      \ probabilities will be stored.\n"
    info: null
    default:
    - "nichecompass_recon_connectivities"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_obsp_agg_weights"
    description: "Key of the obsp field where the aggregation weights of the node\
      \ label aggregator will be stored.\n"
    info: null
    default:
    - "nichecompass_agg_weights"
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "string"
    name: "--output_compression"
    description: "Compression format to use for the output AnnData and/or Mudata objects.\n\
      By default no compression is applied.\n"
    info: null
    example:
    - "gzip"
    required: false
    choices:
    - "gzip"
    - "lzf"
    direction: "input"
    multiple: false
    multiple_sep: ";"
