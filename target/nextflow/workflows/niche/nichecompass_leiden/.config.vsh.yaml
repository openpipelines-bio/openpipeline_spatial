  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.0.3"
- name: "neighbors/spatial_neighborhood_graph"
  repository:
    type: "local"
- name: "nichecompass/nichecompass"
  repository:
    type: "local"
- name: "dataflow/split_h5mu"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.0.3"
- name: "workflows/multiomics/neighbors_leiden_umap"
  repository:
    type: "vsh"
    repo: "openpipeline"
    tag: "v4.0.3"
repositories:
