name: "gene_program_mask"
namespace: "nichecompass"
version: "build_main"
authors:
- name: "Dorien Roosen"
  roles:
  - "maintainer"
  info:
    role: "Core Team Member"
    links:
      email: "dorien@data-intuitive.com"
      github: "dorien-er"
      linkedin: "dorien-roosen"
    organizations:
    - name: "Data Intuitive"
      href: "https://www.data-intuitive.com"
      role: "Data Scientist"
- name: "Jakub Majercik"
  roles:
  - "maintainer"
  info:
    role: "Contributor"
    links:
      email: "jakub@data-intuitive.com"
      github: "jakubmajercik"
      linkedin: "jakubmajercik"
    organizations:
    - name: "Data Intuitive"
      href: "https://www.data-intuitive.com"
      role: "Bioinformatics Engineer"
- name: "Weiwei Schultz"
  roles:
  - "contributor"
  info:
    role: "Contributor"
    organizations:
    - name: "Janssen R&D US"
      role: "Associate Director Data Sciences"
argument_groups:
- name: "Inputs"
  arguments:
  - type: "file"
    name: "--input_gene_orthologs_mapping_file"
    description: "Path to a CSV file mapping human genes to mouse orthologs.\nRequired\
      \ for the OmniPath and NicheNet masks if `--species mouse`.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_metabolite_enzymes"
    description: "Path to the MeBocost metabolite-enzymes TSV file.\nRequired for\
      \ generating the MeBocost gene program mask.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_metabolite_sensors"
    description: "Path to the MeBocost metabolite-sensors TSV file.\nRequired for\
      \ generating the MeBocost gene program mask.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_omnipath_lr_network"
    description: "Path to the OmniPath ligand-receptor network CSV file.\nIf provided,\
      \ the network will be loaded from this file instead of querying the OmniPath\
      \ API.\nCannot be used together with `--output_omnipath_lr_network`.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_nichenet_ligand_target_matrix"
    description: "Path to the NicheNet ligand-target gene regulatory potential matrix\
      \ file.\nIf provided, the matrix will be loaded from this file instead of querying\
      \ the NicheNet API.\n"
    info: null
    example:
    - "nichenet_ligand_target_matrix.csv"
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_nichenet_lrt_network"
    description: "Path to the NicheNet ligand-receptor network CSV file.\nIf provided,\
      \ the network will be loaded from this file instead of querying the NicheNet\
      \ API.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--input_collectri_tf_network"
    description: "Path to the CollecTRI TF-target gene regulatory network CSV file.\n\
      If provided, the network will be loaded from this file instead of querying the\
      \ CollecTRI API.\n"
    info: null
    must_exist: true
    create_parent: true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Parameters"
  arguments:
  - type: "string"
    name: "--species"
    description: "Species of the organism (human or mouse)."
    info: null
    default:
    - "human"
    required: false
    choices:
    - "human"
    - "mouse"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--create_omnipath_gene_program_mask"
    description: "Whether to create the OmniPath gene program mask."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--create_nichenet_gene_program_mask"
    description: "Whether to create the NicheNet gene program mask."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--create_mebocost_gene_program_mask"
    description: "Whether to create the MeBocost gene program mask."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "boolean"
    name: "--create_collectri_tf_gene_program_mask"
    description: "Whether to create the CollecTRI TF gene program mask."
    info: null
    default:
    - true
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--overlap_thresh_target_genes"
    description: "The minimum ratio of target genes that need to overlap between a\
      \ GP without source genes and another GP for the GP to be dropped.\nGene programs\
      \ with different source genes are never combined or dropped.\n"
    info: null
    default:
    - 1.0
    required: false
    min: 0.0
    max: 1.0
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Omnipath Parameters"
  arguments:
  - type: "integer"
    name: "--omnipath_min_curation_effort"
    description: "Minimum number of times an interaction has to be described in a\
      \ paper and mentioned in a database to be included in the OmniPath gene programs."
    info: null
    default:
    - 2
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "NicheNet Parameters"
  arguments:
  - type: "string"
    name: "--nichenet_version"
    description: "Version of the NicheNet ligand receptor network and ligand target\
      \ gene regulatory potential matrix.\n`v2` is an improved version of `v1`, and\
      \ has separate files for mouse and human.\n"
    info: null
    default:
    - "v2"
    required: false
    choices:
    - "v1"
    - "v2"
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "double"
    name: "--nichenet_keep_target_genes_ratio"
    description: "Ratio of target genes that are kept compared to total target genes.\n\
      This ratio is applied over the entire matrix (not on gene program level), and\
      \ determines the `all_gps_score_keep_threshold`, which will be used to filter\
      \ target genes according to their regulatory potential scores.\n"
    info: null
    default:
    - 1.0
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
  - type: "integer"
    name: "--nichenet_max_n_target_genes_per_gp"
    description: "Maximum number of target genes per gene program. If a gene program\
      \ has more target genes than `max_n_target_genes_per_gp`, only the `max_n_target_genes_per_gp`\
      \ gene programs with the highest regulatory potential scores will be kept.\n\
      Default value is chosen based on MultiNicheNet specification (s. Browaeys, R.\
      \ et al. MultiNicheNet: a flexible framework for differential cell-cell communication\
      \ analysis from multi-sample multi-condition single-cell transcriptomics data.\
      \ bioRxiv (2023) doi:10.1101/2023.06.13.544751).\n"
    info: null
    default:
    - 250
    required: false
    direction: "input"
    multiple: false
    multiple_sep: ";"
- name: "Outputs"
  arguments:
  - type: "file"
    name: "--output"
    description: "Path to the output gene program mask JSON file."
    info: null
    example:
    - "gp_mask.json"
    must_exist: true
    create_parent: true
    required: true
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_omnipath_lr_network"
    description: "Path to the output OmniPath ligand-receptor network CSV file.\n\
      If `--input_omnipath_lr_network` is not provided, the network will be saved\
      \ to this file after querying the OmniPath API.\n"
    info: null
    example:
    - "omnipath_lr_network.csv"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_nichenet_lrt_network"
    description: "Path to the output NicheNet ligand-receptor network CSV file.\n\
      If `--input_nichenet_lrt_network` is not provided, the network will be saved\
      \ to this file after querying the NicheNet API.\n"
    info: null
    example:
    - "nichenet_lrt_network.csv"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_nichenet_ligand_target_matrix"
    description: "Path to the output NicheNet ligand-target gene regulatory potential\
      \ matrix file.\nIf `--input_nichenet_ligand_target_matrix` is not provided,\
      \ the matrix will be saved to this file after querying the NicheNet API.\n"
    info: null
    example:
    - "nichenet_ligand_target_matrix.csv"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_collectri_tf_network"
    description: "Path to the output CollecTRI TF-target gene regulatory potential\
      \ network CSV file.\nIf `--input_collectri_tf_network` is not provided, the\
      \ network will be saved to this file after querying the CollecTRI API.\n"
    info: null
    example:
    - "collectri_tf_network.csv"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_omnipath_gp_gene_count_distributions"
    description: "Path to save the OmniPath gene program gene count distributions\
      \ plot."
    info: null
    example:
    - "omnipath_gp_gene_count_distributions.svg"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_nichenet_gp_gene_count_distributions"
    description: "Path to save the NicheNet gene program gene count distributions\
      \ plot."
    info: null
    example:
    - "nichenet_gp_gene_count_distributions.svg"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_mebocost_gp_gene_count_distributions"
    description: "Path to save the MeBocost gene program gene count distributions\
      \ plot."
    info: null
    example:
    - "mebocost_gp_gene_count_distributions.svg"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
  - type: "file"
    name: "--output_collectri_tf_gp_gene_count_distributions"
    description: "Path to save the CollecTRI TF gene program gene count distributions\
      \ plot."
    info: null
    example:
    - "collectri_tf_gp_gene_count_distributions.svg"
    must_exist: true
    create_parent: true
    required: false
    direction: "output"
    multiple: false
    multiple_sep: ";"
resources:
- type: "python_script"
  path: "script.py"
  is_executable: true
- type: "file"
  path: "setup_logger.py"
- type: "file"
  path: "nextflow_labels.config"
  dest: "nextflow_labels.config"
description: "Generation of a prior knowledge gene program mask for NicheCompass."
test_resources:
- type: "python_script"
  path: "test.py"
  is_executable: true
- type: "file"
  path: "niche"
info: null
status: "enabled"
scope:
  image: "public"
  target: "public"
repositories:
- type: "vsh"
  name: "openpipeline"
  repo: "openpipeline"
  tag: "v4.0.3"
links:
  repository: "https://github.com/openpipelines-bio/openpipeline_spatial"
  docker_registry: "ghcr.io"
runners:
- type: "executable"
  id: "executable"
  docker_setup_strategy: "ifneedbepullelsecachedbuild"
- type: "nextflow"
  id: "nextflow"
  directives:
    label:
    - "lowcpu"
    - "lowmem"
    - "lowdisk"
    tag: "$id"
  auto:
    simplifyInput: true
    simplifyOutput: false
    transcript: false
    publish: false
  config:
    labels:
      mem1gb: "memory = 1000000000.B"
      mem2gb: "memory = 2000000000.B"
      mem5gb: "memory = 5000000000.B"
      mem10gb: "memory = 10000000000.B"
      mem20gb: "memory = 20000000000.B"
      mem50gb: "memory = 50000000000.B"
      mem100gb: "memory = 100000000000.B"
      mem200gb: "memory = 200000000000.B"
      mem500gb: "memory = 500000000000.B"
      mem1tb: "memory = 1000000000000.B"
      mem2tb: "memory = 2000000000000.B"
      mem5tb: "memory = 5000000000000.B"
      mem10tb: "memory = 10000000000000.B"
      mem20tb: "memory = 20000000000000.B"
      mem50tb: "memory = 50000000000000.B"
      mem100tb: "memory = 100000000000000.B"
      mem200tb: "memory = 200000000000000.B"
      mem500tb: "memory = 500000000000000.B"
      mem1gib: "memory = 1073741824.B"
      mem2gib: "memory = 2147483648.B"
      mem4gib: "memory = 4294967296.B"
      mem8gib: "memory = 8589934592.B"
      mem16gib: "memory = 17179869184.B"
      mem32gib: "memory = 34359738368.B"
      mem64gib: "memory = 68719476736.B"
      mem128gib: "memory = 137438953472.B"
      mem256gib: "memory = 274877906944.B"
      mem512gib: "memory = 549755813888.B"
      mem1tib: "memory = 1099511627776.B"
      mem2tib: "memory = 2199023255552.B"
      mem4tib: "memory = 4398046511104.B"
      mem8tib: "memory = 8796093022208.B"
      mem16tib: "memory = 17592186044416.B"
      mem32tib: "memory = 35184372088832.B"
      mem64tib: "memory = 70368744177664.B"
      mem128tib: "memory = 140737488355328.B"
      mem256tib: "memory = 281474976710656.B"
      mem512tib: "memory = 562949953421312.B"
      cpu1: "cpus = 1"
      cpu2: "cpus = 2"
      cpu5: "cpus = 5"
      cpu10: "cpus = 10"
      cpu20: "cpus = 20"
      cpu50: "cpus = 50"
      cpu100: "cpus = 100"
      cpu200: "cpus = 200"
      cpu500: "cpus = 500"
      cpu1000: "cpus = 1000"
    script:
    - "includeConfig(\"nextflow_labels.config\")"
  debug: false
  container: "docker"
engines:
- type: "docker"
  id: "docker"
  image: "nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04"
  namespace_separator: "/"
  setup:
  - type: "apt"
    packages:
    - "libhdf5-dev"
    - "python3-pip"
    - "python3-dev"
    - "python-is-python3"
    interactive: false
  - type: "docker"
    run:
    - "pip install torch --index-url https://download.pytorch.org/whl/cu124 \\\n&&\
      \ pip install pyg_lib torch-scatter torch-sparse -f https://data.pyg.org/whl/torch-2.6.0+cu124.html\
      \   \n"
  - type: "python"
    user: false
    packages:
    - "numpy<2"
    - "nichecompass"
    upgrade: true
  test_setup:
  - type: "apt"
    packages:
    - "git"
    interactive: false
  - type: "python"
    user: false
    packages:
    - "viashpy==0.9.0"
    github:
    - "openpipelines-bio/core#subdirectory=packages/python/openpipeline_testutils"
    upgrade: true
  entrypoint: []
  cmd: null
build_info:
  config: "src/nichecompass/gene_program_mask/config.vsh.yaml"
  runner: "executable"
  engine: "docker"
  output: "target/executable/nichecompass/gene_program_mask"
  executable: "target/executable/nichecompass/gene_program_mask/gene_program_mask"
  viash_version: "0.9.4"
  git_commit: "cd60eb045bb9bc7253cd5c6c562b4994e37d0018"
  git_remote: "https://github.com/openpipelines-bio/openpipeline_spatial"
package_config:
  name: "openpipeline_spatial"
  version: "build_main"
  info:
    test_resources:
    - type: "s3"
      path: "s3://openpipelines-bio/openpipeline_spatial/resources_test"
      dest: "resources_test"
  repositories:
  - type: "vsh"
    name: "openpipeline"
    repo: "openpipeline"
    tag: "v4.0.3"
  viash_version: "0.9.4"
  source: "src"
  target: "target"
  config_mods:
  - ".resources += {path: '/src/workflows/utils/labels.config', dest: 'nextflow_labels.config'}\n\
    .runners[.type == 'nextflow'].config.script := 'includeConfig(\"nextflow_labels.config\"\
    )'"
  organization: "openpipelines-bio"
  links:
    repository: "https://github.com/openpipelines-bio/openpipeline_spatial"
    docker_registry: "ghcr.io"
